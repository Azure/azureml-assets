  recordCount: "114"
  license: "MIT"
  properties:
    domain: "agents"
    source_paper: "https://arxiv.org/abs/2506.07982"
    dataset_source: "https://github.com/sierra-research/tau2-bench"
  source:
    provider: "mlregistry"
    sourceDatasetId: "azureml://registries/azureml/data/tau2_telecom/versions/1"
    sourceFormat: "jsonl"
    properties:
      file_name: "tau2_telecom.jsonl"
      type: "uri_folder"
