name: tensorflow-2.16-cuda12
channels:
- conda-forge
- anaconda
dependencies:
- python=3.11
- pip=26.0
- pandas=2.2.2
- numpy=1.23.5
- scipy~=1.14.0
- pip:
  - setuptools>=82.0.1  # vendors jaraco.context; >=82.0.1 bundles patched version (GHSA-58pv-8j8x-9vj2)
  - wheel==0.46.2
  - matplotlib~=3.5.0
  - psutil~=5.8.0
  - tqdm~=4.66.3
  - ipykernel~=6.20.2
  - azureml-core=={{latest-pypi-version}}
  - azureml-defaults=={{latest-pypi-version}}
  - azureml-mlflow=={{latest-pypi-version}}
  - azureml-telemetry=={{latest-pypi-version}}
  - tensorboard~=2.16.0
  - tensorflow[and-cuda]==2.16.2
  - tensorflow-datasets~=4.9.0
  - keras>=3.13.2  # CVE-2026-1669 (HIGH 7.5) - bumped from 3.13.1
  - tf-keras==2.16.0
  - debugpy~=1.6.3
  - idna>=3.7
  - flask-cors==6.0.0
  - pillow>=12.2.0  # GHSA-whj4-6x5x-4v2j - bumped from 12.1.1
  