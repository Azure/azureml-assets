  - sw
  - ta
  - te
  - th
  - tl
  - tr
  - uk
  - ur
  - vi
  - yo
  - zh
  sharedComputeCapacityEnabled: true
  tasks:
    fineTuningTasks:
    - chat-completion
    inferenceTasks:
    - chat-completion
  SKU:
    inferenceRecommendedSkus:
    - Standard_NC24ads_A100_v4
    - Standard_NC48ads_A100_v4
    - Standard_NC96ads_A100_v4
    - Standard_ND96asr_v4
    - Standard_ND96amsr_A100_v4
    - Standard_ND96isr_H100_v5
    - Standard_NC40ads_H100_v5
    - Standard_NC80adis_H100_v5
    finetuneRecommendedSkus:
    - Standard_NC24ads_A100_v4
    - Standard_NC48ads_A100_v4
    - Standard_NC96ads_A100_v4
    - Standard_ND96asr_v4
    - Standard_ND96amsr_A100_v4
    - Standard_NC40ads_H100_v5
    - Standard_NC80adis_H100_v5
    - Standard_ND96isr_H100_v5
    inferenceMinSkuSpec: 24|1|220|64
    finetuneMinSkuSpec: 24|1|220|64
  publisher: Microsoft
  benchmark: quality
  displayName: Phi-4
  evaluation: evaluation.md
  freePlayground: true
  hiddenLayerScanned: true
