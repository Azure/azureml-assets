name: data-labeling
channels:
- conda-forge
- pytorch
dependencies:
- python=3.10
- pip
- pip:
  - azureml-core=={{latest-pypi-version}}
  - azureml-contrib-dataset=={{latest-pypi-version}}
  - azureml-dataset-runtime[fuse,pandas]
  - azureml-defaults=={{latest-pypi-version}}
  - azure-storage-blob==12.14.1
  - Pillow
  - pycairo==1.20.1
  - pydicom
  - python-rle==0.0.3
  # Pinning setuptools to avoid import issue with azureml-core as temp workaround. This can be removed once azureml-core is updated to remove the dependency on pkg_resources.
  - setuptools==81.0.0
