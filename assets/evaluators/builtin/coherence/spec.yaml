type: "evaluator"
name: "builtin.coherence"
version: 5
displayName: "Coherence-Evaluator"
description: "Evaluates how logically connected and consistent the response is. Ensures ideas flow naturally and make sense together. It’s best used for generative business writing such as summarizing meeting notes, creating marketing materials, and drafting emails."
evaluatorType: "builtin"
evaluatorSubType: "code"
categories: ["quality", "agents"]
supportedEvaluationLevels: ["conversation", "turn"]
tags:
  provider: "Microsoft"
  is_continuous_scenario: "true"
initParameterSchema:
  type: "object"
  properties:
    deployment_name:
      type: "string"
    threshold:
      type: "number"
      minimum: 1
      maximum: 5
      multipleOf: 1
    evaluation_level:
      type: "string"
  required: ["deployment_name"]
dataMappingSchema:
  type: "object"
  properties:
    query:
      anyOf:
        - type: "string"
        - type: "array"
          items:
            type: "object"
    response:
      anyOf:
        - type: "string"
        - type: "array"
          items:
            type: "object"
    messages:
      type: "array"
      items:
        type: "object"
  anyOf:
    - required: ["query", "response"]
    - required: ["messages"]
outputSchema:
  coherence:
    type: "ordinal"
    desirable_direction: "increase"
    min_value: 1
    max_value: 5
path: ./evaluator
