type: "evaluator"
name: "builtin.quality_grader"
version: 1
displayName: "Quality-Grader-Evaluator"
description: "Assesses the quality of an AI assistant's response at the turn level,
  evaluating dimensions such as relevance, abstention, and answer completeness. When
  context is provided, it additionally evaluates groundedness and context coverage.
  Use this evaluator for chatbots, virtual assistants, and retrieval-augmented generation
  (RAG) systems where per-turn response quality is critical."
evaluatorType: "builtin"
evaluatorSubType: "code"
categories: ["quality", "agents"]
tags:
  provider: "Microsoft"
  is_continuous_scenario: "true"
supportedEvaluationLevels: ["turn"]
initParameterSchema:
  type: "object"
  properties:
    deployment_name:
      type: "string"
  required: ["deployment_name"]
dataMappingSchema:
  type: "object"
  properties:
    query:
      anyOf:
      - type: "string"
      - type: "array"
        items:
          type: "object"
    response:
      anyOf:
      - type: "string"
      - type: "array"
        items:
          type: "object"
    context:
      type: "string"
  required: ["query", "response"]
outputSchema:
  quality_grader:
    type: "ordinal"
    desirable_direction: "increase"
    min_value: 0
    max_value: 1
path: ./evaluator
