name: smollm3-3b
path: ./
isArchived: true
system_metadata:
  foundryLocal: ''
version: 1
description: |-
  This model is an optimized version of SmolLM3-3B for local inference. Optimized models are published here in ONNX format to run on CPU and GPU across devices, including server platforms, Windows, Linux and Mac desktops, and mobile CPUs, with the precision best suited to each of these targets.

  # ONNX Models
  Here are some of the optimized configurations we have added:
  1.	ONNX model for CPU and mobile using GPTQ quantization.
  2.	ONNX model for GPU using GPTQ quantization.

  # Model Description
  - **Developed by:** Microsoft
  - **Model type:** ONNX
  - **License:** apache-2.0
  - **Model Description:** This is a conversion of the SmolLM3-3B for local inference.
  - **Disclaimer:** Model is only an optimization of the base model, any risk associated with the model is the responsibility of the user of the model. Please verify and test for your scenarios. There may be a slight difference in output from the base model with the optimizations applied. Note that optimizations applied are distinct from fine tuning and thus do not alter the intended uses or capabilities of the model.

  # Base Model Information
  See Hugging Face model [SmolLM3-3B](https://huggingface.co/HuggingFaceTB/SmolLM3-3B) for details.
