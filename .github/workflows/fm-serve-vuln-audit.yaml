name: fm-serve-vuln-audit

# Daily autonomous vulnerability-audit agent for the foundation-model-serve
# environment.
#
# Scope: assets/training/model_management/environments/foundation-model-serve/*
#   - context/requirements.txt
#   - pinned packages (name==version) in context/Dockerfile `RUN pip install`
#
# Behaviour:
#   1. Runs `pip-audit` against both sources, pulling GHSA severities.
#   2. Decides whether a patch PR is warranted:
#        - severe  => advisory of CRITICAL or HIGH severity is present
#                     (also treated as severe: any advisory whose available
#                     fix version is a reachable bump within the pinned range).
#        - not severe => no fixable CRITICAL/HIGH advisory; PR is not needed.
#   3. If severe: applies minimum-safe fix versions, opens/updates the PR
#      on branch `auto/fm-serve-vuln-audit`, requests review from the
#      configured reviewer, and posts a reasoning comment (advisory table
#      + decision rationale).
#   4. If not severe: no PR is created. If a stale auto-PR already exists,
#      it is closed with a reasoning comment explaining why.

on:
  schedule:
    # 02:30 UTC daily == 08:00 IST daily
    - cron: "30 2 * * *"
  workflow_dispatch:
    inputs:
      reviewer:
        description: GitHub username to tag / request review from
        default: pabhatia-ms
        required: false

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  SCOPE_DIR: assets/training/model_management/environments/foundation-model-serve/context
  AUTO_BRANCH: auto/fm-serve-vuln-audit
  REVIEWER: ${{ github.event.inputs.reviewer || 'pabhatia-ms' }}

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pip-audit==2.7.3" "packaging>=24"

      - name: Extract Dockerfile pip-install pins
        run: |
          python - <<'PY'
          import os, re, pathlib
          ctx = pathlib.Path(os.environ["SCOPE_DIR"])
          df = (ctx / "Dockerfile").read_text()
          pins = set()
          for m in re.finditer(r"(?m)^\s*RUN[^\n]*pip\s+install[^\n]*", df):
              for p in re.finditer(r"([A-Za-z0-9][A-Za-z0-9_.\-]*)==([A-Za-z0-9][A-Za-z0-9_.\-]*)", m.group(0)):
                  pins.add(f"{p.group(1)}=={p.group(2)}")
          pathlib.Path("dockerfile-pins.txt").write_text(
              "\n".join(sorted(pins)) + ("\n" if pins else "")
          )
          print("Dockerfile pins:\n" + pathlib.Path("dockerfile-pins.txt").read_text())
          PY

      - name: Run pip-audit (JSON, both sources)
        run: |
          pip-audit -r "${SCOPE_DIR}/requirements.txt" \
            --format=json --disable-pip --output=req-audit.json || true
          if [[ -s dockerfile-pins.txt ]]; then
            pip-audit -r dockerfile-pins.txt \
              --format=json --disable-pip --output=df-audit.json || true
          else
            echo '{"dependencies": []}' > df-audit.json
          fi

      - name: Classify severity and apply fixes
        id: classify
        run: |
          python - <<'PY'
          import json, os, pathlib, re
          from packaging.version import Version

          SEVERE = {"CRITICAL", "HIGH"}
          scope = pathlib.Path(os.environ["SCOPE_DIR"])
          req_path = scope / "requirements.txt"
          df_path = scope / "Dockerfile"

          def load(path):
              p = pathlib.Path(path)
              if not p.exists() or not p.stat().st_size:
                  return {"dependencies": []}
              return json.loads(p.read_text())

          req = load("req-audit.json")
          df  = load("df-audit.json")

          # Flatten advisories with source tagging.
          findings = []
          def collect(doc, source):
              for dep in doc.get("dependencies", []):
                  for v in dep.get("vulns", []) or []:
                      sev = (v.get("severity") or "").upper() or "UNKNOWN"
                      findings.append({
                          "source": source,
                          "name": dep.get("name"),
                          "version": dep.get("version"),
                          "id": v.get("id"),
                          "fix_versions": v.get("fix_versions") or [],
                          "severity": sev,
                          "description": (v.get("description") or "").strip().splitlines()[0][:200],
                      })
          collect(req, "requirements.txt")
          collect(df, "Dockerfile")

          severe = [f for f in findings if f["severity"] in SEVERE and f["fix_versions"]]
          severe_unfixable = [f for f in findings if f["severity"] in SEVERE and not f["fix_versions"]]
          non_severe = [f for f in findings if f["severity"] not in SEVERE]

          decision = "open" if severe else "skip"
          print(f"Severe fixable: {len(severe)}  Severe unfixable: {len(severe_unfixable)}  Non-severe: {len(non_severe)}  Decision: {decision}")

          # Apply fixes only for severe advisories (minimum safe version).
          applied = []
          if decision == "open":
              # requirements.txt: line-oriented rewrite
              if req_path.exists():
                  lines = req_path.read_text().splitlines()
                  out = []
                  for line in lines:
                      m = re.match(r"^\s*([A-Za-z0-9][A-Za-z0-9_.\-]*)\s*==\s*([A-Za-z0-9_.\-]+)\s*(#.*)?$", line)
                      replaced = False
                      if m:
                          pkg = m.group(1)
                          for f in severe:
                              if f["source"] == "requirements.txt" and f["name"].lower() == pkg.lower():
                                  new = str(min(Version(v) for v in f["fix_versions"]))
                                  if new != m.group(2):
                                      out.append(f"{pkg}=={new}" + (" " + m.group(3) if m.group(3) else ""))
                                      applied.append(f"requirements.txt: {pkg} {m.group(2)} -> {new}")
                                      replaced = True
                                      break
                      if not replaced:
                          out.append(line)
                  req_path.write_text("\n".join(out) + ("\n" if lines and lines[-1] == "" else "\n"))

              # Dockerfile: regex substitution
              text = df_path.read_text()
              for f in severe:
                  if f["source"] != "Dockerfile":
                      continue
                  new = str(min(Version(v) for v in f["fix_versions"]))
                  pattern = re.compile(rf"(?<![A-Za-z0-9_.\-]){re.escape(f['name'])}==[A-Za-z0-9_.\-]+")
                  updated, n = pattern.subn(f"{f['name']}=={new}", text)
                  if n:
                      text = updated
                      applied.append(f"Dockerfile: {f['name']} {f['version']} -> {new}")
              df_path.write_text(text)

          # Persist summary for later steps.
          summary = {
              "decision": decision,
              "severe_fixable": severe,
              "severe_unfixable": severe_unfixable,
              "non_severe": non_severe,
              "applied": applied,
          }
          pathlib.Path("audit-summary.json").write_text(json.dumps(summary, indent=2))

          # Build a markdown reasoning comment.
          def row(f):
              return f"| `{f['source']}` | `{f['name']}` | `{f['version']}` | {f['severity']} | {f['id']} | {', '.join(f['fix_versions']) or '—'} |"
          md = []
          md.append(f"### fm-serve vulnerability audit — {decision.upper()}")
          md.append("")
          md.append(f"**Scope:** `{os.environ['SCOPE_DIR']}/` (requirements.txt + Dockerfile `RUN pip install` pins)")
          md.append("")
          md.append("**Decision rule:** open a PR only if at least one advisory is severity `CRITICAL` or `HIGH` **and** has an upstream fix version.")
          md.append("")
          if decision == "open":
              md.append(f"✅ **{len(severe)} severe fixable advisory(ies) found** — opening/updating PR.")
          else:
              md.append("🟢 **No severe fixable advisories** — no PR needed; any existing auto PR will be closed.")
          md.append("")
          if severe or severe_unfixable:
              md.append("#### Severe advisories")
              md.append("| Source | Package | Installed | Severity | Advisory | Fix versions |")
              md.append("|---|---|---|---|---|---|")
              for f in severe + severe_unfixable:
                  md.append(row(f))
              md.append("")
          if non_severe:
              md.append(f"<details><summary>{len(non_severe)} non-severe advisory(ies) (informational, not gating)</summary>\n")
              md.append("| Source | Package | Installed | Severity | Advisory | Fix versions |")
              md.append("|---|---|---|---|---|---|")
              for f in non_severe:
                  md.append(row(f))
              md.append("\n</details>")
              md.append("")
          if applied:
              md.append("#### Applied bumps")
              for a in applied:
                  md.append(f"- {a}")
              md.append("")
          md.append(f"_Audited by `.github/workflows/fm-serve-vuln-audit.yaml` — run {os.environ.get('GITHUB_RUN_ID','?')}._")
          pathlib.Path("reasoning.md").write_text("\n".join(md))

          # Expose outputs.
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"decision={decision}\n")
              fh.write(f"severe_count={len(severe)}\n")
              fh.write(f"applied_count={len(applied)}\n")
          PY

      - name: Upload audit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fm-serve-audit
          path: |
            req-audit.json
            df-audit.json
            audit-summary.json
            reasoning.md

      # ---------- PR needed: open/update and comment ----------
      - name: Create or update Pull Request
        if: steps.classify.outputs.decision == 'open'
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          branch: ${{ env.AUTO_BRANCH }}
          delete-branch: true
          title: "[auto] foundation-model-serve: vulnerability patches"
          commit-message: "chore(fm-serve): bump vulnerable packages per pip-audit"
          body-path: reasoning.md
          reviewers: ${{ env.REVIEWER }}
          labels: |
            automated
            security

      - name: Comment reasoning on PR
        if: steps.classify.outputs.decision == 'open' && steps.cpr.outputs.pull-request-number
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        with:
          script: |
            const fs = require('fs');
            const body = `@${process.env.REVIEWER}\n\n` + fs.readFileSync('reasoning.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body,
            });

      # ---------- PR not needed: close stale auto PR if present ----------
      - name: Close stale auto PR (no severe findings)
        if: steps.classify.outputs.decision == 'skip'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const branch = process.env.AUTO_BRANCH;
            const reviewer = process.env.REVIEWER;
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branch}`,
            });
            if (prs.length === 0) {
              core.info('No open auto PR; nothing to close.');
              return;
            }
            const reasoning = fs.readFileSync('reasoning.md', 'utf8');
            for (const pr of prs) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `@${reviewer}\n\nClosing this automated PR: today's audit found no severe (CRITICAL/HIGH) fixable advisories in scope. Full reasoning below.\n\n---\n\n${reasoning}`,
              });
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                state: 'closed',
              });
              core.info(`Closed PR #${pr.number}`);
            }
        env:
          AUTO_BRANCH: ${{ env.AUTO_BRANCH }}
          REVIEWER: ${{ env.REVIEWER }}
